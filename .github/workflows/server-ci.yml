name: Server CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - "**"

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-server-api:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      NODE_ENV: test
      JWT_SECRET: ci_jwt_secret
      GEMINI_API_KEY: ci_gemini_key
      GEMINI_MODEL: gemini-2.0-flash
      TEST_MONGODB_URI: mongodb://127.0.0.1:27017/resume_builder_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test
